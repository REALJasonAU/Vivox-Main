version: "2"
sql:
  - schema: "../../infra/migrations/schema.sql"
    queries: "query.sql"
    engine: "postgresql"
    gen:
      go:
        package: "db"
        out: "internal/db"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_pointers_for_null_types: true
        overrides:
          - column: "services.resource_limits"
            go_type: "github.com/nexus-control/packages/domain.ResourceLimits"
          - column: "services.config"
            go_type: "github.com/nexus-control/packages/domain.ServiceConfig"
          - column: "nodes.capacity"
            go_type: "github.com/nexus-control/packages/domain.NodeCapacity"
