# buf code generation config.
#
# Usage (requires `buf` installed: https://buf.build):
#   cd packages/proto
#   buf generate
#
# This produces gen/agent.pb.go and gen/agent_grpc.pb.go.
# The go_package option in agent.proto
# (github.com/nexus-control/packages/proto/gen;gen) combined with
# paths=source_relative places the output directly under ./gen.
version: v2
inputs:
  - directory: .
plugins:
  - remote: buf.build/protocolbuffers/go
    out: gen
    opt: paths=source_relative
  - remote: buf.build/grpc/go
    out: gen
    opt: paths=source_relative
