syntax = "proto3";
package proto;
option go_package = "github.com/nexus-control/packages/proto/gen;gen";

service AgentController {
  rpc ConnectStream(stream UpstreamEnvelope) returns (stream DownstreamEnvelope);
}

message UpstreamEnvelope {
  string agent_id = 1;
  oneof payload {
    Heartbeat heartbeat = 2;
    LogChunk logs = 3;
    MetricSnapshot metrics = 4;
    CommandResponse response = 5;
    FileListResult file_list = 6;
    FileReadResult file_read = 7;
    TerminalOutput terminal_output = 8;
    HealthCheckResult health_check_result = 9;
    BackupResult backup_result = 10;
  }
}

message DownstreamEnvelope {
  string command_id = 1;
  oneof action {
    StartServiceTask start = 2;
    StopServiceTask stop = 3;
    UpdateConfigTask update = 4;
    FileListTask list_files = 5;
    FileReadTask read_file = 6;
    FileWriteTask write_file = 7;
    TerminalStartTask terminal_start = 8;
    TerminalInputTask terminal_input = 9;
    TerminalResizeTask terminal_resize = 10;
    BackupTask backup_task = 11;
  }
}

message Heartbeat { int64 timestamp = 1; string status = 2; SystemInfo system_info = 3; }
message SystemInfo {
  int64 cpu_cores = 1;
  int64 ram_mb = 2;
  int64 disk_gb = 3;
  string os = 4;
  string arch = 5;
  string agent_version = 6;
}
message LogChunk { string service_id = 1; bytes data = 2; string stream_type = 3; }
message MetricSnapshot { string service_id = 1; double cpu_usage_percent = 2; uint64 memory_bytes_used = 3; uint64 disk_bytes_used = 4; }
message HealthCheckResult {
  string service_id  = 1;
  bool   healthy     = 2;
  int32  status_code = 3;
  int64  latency_ms  = 4;
  string error       = 5;
  int32  interval_sec = 6;
}
message CommandResponse { string command_id = 1; bool success = 2; string error_message = 3; }

message StartServiceTask {
  string service_id = 1;
  string container_image = 2;
  repeated string port_bindings = 3;
  map<string,string> env_vars = 4;
  int64 memory_limit_bytes = 5;
  string health_path = 6;
  int32 health_port = 7;
  int32 health_interval_sec = 8;
  int32 health_timeout_sec = 9;
}
message StopServiceTask { string service_id = 1; int32 timeout_seconds = 2; }
message UpdateConfigTask { string service_id = 1; map<string,string> new_env_vars = 2; }

message FileListTask { string service_id = 1; string path = 2; }
message FileListResult { string service_id = 1; string path = 2; repeated FileEntry entries = 3; string error = 4; string command_id = 5; }
message FileEntry { string name = 1; bool is_dir = 2; int64 size = 3; string modified = 4; string permissions = 5; }
message FileReadTask { string service_id = 1; string path = 2; }
message FileReadResult { string service_id = 1; string path = 2; bytes content = 3; string error = 4; string command_id = 5; }
message FileWriteTask { string service_id = 1; string path = 2; bytes content = 3; }

message TerminalStartTask { string service_id = 1; string session_id = 2; string shell = 3; int32 cols = 4; int32 rows = 5; }
message TerminalInputTask { string service_id = 1; string session_id = 2; bytes data = 3; }
message TerminalResizeTask { string service_id = 1; string session_id = 2; int32 cols = 3; int32 rows = 4; }
message TerminalOutput { string service_id = 1; string session_id = 2; bytes data = 3; bool closed = 4; }

message BackupTask {
  string service_id = 1;
  string backup_id = 2;
}

message BackupResult {
  string backup_id = 1;
  bool success = 2;
  int64 size_bytes = 3;
  string error = 4;
}
