# Nexus Control — full local stack (postgres, redis, api, web).
#
# Usage:
#   docker compose -f infra/dev/docker-compose.yml up --build
#
# First login: register at http://localhost:3000/register then promote to admin:
#   docker compose -f infra/dev/docker-compose.yml exec postgres \
#     psql -U nexus -d nexus -c "UPDATE \"user\" SET role='admin' WHERE email='you@example.com';"
#
# Register a node (as admin) via UI or API, then run the agent on the host:
#   go run ./apps/agent/cmd/agent -addr localhost:9090 -agent-id <node-id> \
#     -token <agent-token> -insecure

services:
  postgres:
    image: postgres:16
    container_name: nexus-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: nexus
      POSTGRES_DB: nexus
    ports:
      - "5432:5432"
    volumes:
      - nexus-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexus -d nexus"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    container_name: nexus-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - nexus-redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    container_name: nexus-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      HTTP_ADDR: ":8080"
      GRPC_ADDR: ":9090"
      DATABASE_URL: postgres://nexus:nexus@postgres:5432/nexus
      REDIS_ADDR: redis:6379
      BETTER_AUTH_SECRET: dev-insecure-secret-change-me
      BETTER_AUTH_JWKS_URL: http://web:3000/api/auth/jwks
      AUTH_DEV_MODE: "false"
      GRPC_TLS_DISABLED: "true"
      MIGRATIONS_DIR: /app/infra/migrations
      TEMPLATES_DIR: /app/templates
      CADDY_ADMIN_URL: http://caddy:2019
      NODE_PUBLIC_HOST: host.docker.internal
    ports:
      - "8080:8080"
      - "9090:9090"

	web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
    container_name: nexus-web
    restart: unless-stopped
    depends_on:
      - api
    environment:
      DATABASE_URL: postgres://nexus:nexus@postgres:5432/nexus
      BETTER_AUTH_SECRET: dev-insecure-secret-change-me
      BETTER_AUTH_URL: http://localhost:3000
      API_INTERNAL_URL: http://api:8080
      NEXT_PUBLIC_API_URL: /api/control
    ports:
      - "3000:3000"

  caddy:
    image: caddy:2-alpine
    container_name: vivox-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "2019:2019"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    environment:
      CADDY_ADMIN: "0.0.0.0:2019"

volumes:
  nexus-pgdata:
  nexus-redisdata:
  caddy-data:
  caddy-config:
